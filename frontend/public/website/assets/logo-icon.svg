<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72" fill="none">
  <!-- Rounded square background -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="#0d1b2a"/>

  <!-- Two side vehicle trailers (solar panels, flat gold) -->
  <rect x="6"  y="30" width="18" height="12" rx="3" fill="#c4912a"/>
  <line x1="13" y1="30" x2="13" y2="42" stroke="rgba(13,27,42,0.35)" stroke-width="1.5"/>
  <line x1="18" y1="30" x2="18" y2="42" stroke="rgba(13,27,42,0.35)" stroke-width="1.5"/>

  <!-- Satellite body (flat dark) -->
  <rect x="24" y="24" width="24" height="18" rx="4" fill="#0d1b2a"/>
  <rect x="27" y="31" width="18" height="5" rx="1.2" fill="none" stroke="rgba(196,145,42,0.55)" stroke-width="1.2"/>
  <circle cx="31" cy="33.5" r="2"   fill="#fde68a"/>
  <circle cx="36" cy="33.5" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="41" cy="33.5" r="2"   fill="rgba(120,200,255,0.9)"/>

  <rect x="48" y="30" width="18" height="12" rx="3" fill="#c4912a"/>
  <line x1="54" y1="30" x2="54" y2="42" stroke="rgba(13,27,42,0.35)" stroke-width="1.5"/>
  <line x1="59" y1="30" x2="59" y2="42" stroke="rgba(13,27,42,0.35)" stroke-width="1.5"/>

  <!-- Satellite arcs (antenna stroke) -->
  <line x1="36" y1="10" x2="36" y2="24" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 13 A9 7 0 0 1 44 13" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- GPS beam lines (flat gold) -->
  <line x1="30" y1="42" x2="26" y2="57" stroke="#c4912a" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2.5 3.5" opacity="0.9"/>
  <line x1="36" y1="42" x2="36" y2="59" stroke="#c4912a" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="2.5 3.5" opacity="0.95"/>
  <line x1="42" y1="42" x2="46" y2="57" stroke="#c4912a" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2.5 3.5" opacity="0.9"/>
</svg>
